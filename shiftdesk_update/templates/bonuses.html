{% extends "base.html" %}
{% set page_title = "Бонуси" %}
{% set title = "Бонуси" %}

{% block content %}
<div class="row space" style="margin-bottom:18px;">
  <div>
    <h2 style="margin:0;">🎁 Бонуси</h2>
    <div class="muted">Месечен бонус към заплатата и PDF отчета.</div>
  </div>
</div>

<div class="card" style="margin-bottom:18px;">
  <form method="GET" class="row">
    <input type="number" name="year" value="{{ year }}" style="max-width:140px;">
    <input type="number" name="month" value="{{ month }}" min="1" max="12" style="max-width:120px;">
    <button class="btn" type="submit">Покажи</button>
  </form>
</div>

<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(290px,1fr));">
  {% for row in rows %}
  <div class="card">
    <h3 style="margin-top:0;">{{ row.first_name }} {{ row.last_name }}</h3>
    <div class="muted">{{ row.department or '-' }}</div>

    <form method="POST">
      <input type="hidden" name="employee_id" value="{{ row.id }}">
      <input type="hidden" name="year" value="{{ year }}">
      <input type="hidden" name="month" value="{{ month }}">

      <label>Бонус (€)</label>
      <input type="number" step="0.01" name="amount" value="{{ row.bonus }}">

      <label>Бележка</label>
      <input type="text" name="note" value="{{ row.note or '' }}">

      <button class="btn" style="margin-top:12px;" type="submit">Запази</button>
    </form>
  </div>
  {% endfor %}
</div>
{% endblock %}
