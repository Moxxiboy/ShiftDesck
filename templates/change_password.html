{% extends "base.html" %}
{% set page_title = "Смяна на парола" %}
{% set title = "Смяна на парола" %}
{% block content %}
<div class="card" style="max-width:500px;">
  <h2 style="margin-top:0;">🔐 Смяна на парола</h2>
  <p class="muted">Трябва да смените временната си парола преди да продължите.</p>
  <form method="POST">
    <label>Нова парола</label><input type="password" name="new_password" required minlength="6">
    <label>Повтори парола</label><input type="password" name="confirm_password" required minlength="6">
    <button class="btn" style="margin-top:16px;" type="submit">Запази</button>
  </form>
</div>
{% endblock %}
