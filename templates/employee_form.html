{% extends 'base.html' %}{% set page_title='Служител' %}{% block content %}
<div class="card"><h2>{{ 'Редакция' if employee else 'Нов служител' }}</h2><form method="post" class="form-grid"><div><label>Име</label><input name="first_name" value="{{ employee.first_name if employee else '' }}" required></div><div><label>Фамилия</label><input name="last_name" value="{{ employee.last_name if employee else '' }}" required></div><div><label>Email</label><input name="email" value="{{ employee.email if employee else '' }}"></div><div><label>Телефон</label><input name="phone" value="{{ employee.phone if employee else '' }}"></div><div><label>Отдел</label><select name="department_id"><option value="">---</option>{% for d in departments %}<option value="{{ d.id }}" {% if employee and employee.department_id==d.id %}selected{% endif %}>{{ d.name }}</option>{% endfor %}</select></div><div><label>Ставка €/час</label><input name="hourly_rate" type="number" step="0.01" value="{{ employee.hourly_rate if employee else '8.00' }}"></div><div class="full"><button class="btn">Запази</button></div></form></div>
{% endblock %}
