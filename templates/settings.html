{% extends "base.html" %}
{% set page_title = "Настройки" %}
{% set title = "Настройки" %}
{% block content %}
<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(320px,1fr));">
<div class="card"><h2 style="margin-top:0;">⚙️ Профил</h2><form method="POST" enctype="multipart/form-data"><input type="hidden" name="action" value="profile">{% if employee and employee.photo %}<img src="{{ url_for('static', filename='uploads/' ~ employee.photo) }}" style="width:92px;height:92px;object-fit:cover;border-radius:24px;border:1px solid var(--line);margin-bottom:12px;">{% endif %}<label>Профилна снимка</label><input type="file" name="photo" accept=".png,.jpg,.jpeg,.webp"><label>Email</label><input type="email" name="email" value="{{ employee.email if employee else '' }}"><label>Телефон</label><input type="text" name="phone" value="{{ employee.phone if employee else '' }}"><label>Тема</label><select name="theme"><option value="dark" {% if theme == 'dark' %}selected{% endif %}>Тъмен режим</option><option value="light" {% if theme == 'light' %}selected{% endif %}>Светъл режим</option></select><button class="btn" style="margin-top:16px;" type="submit">Запази</button></form></div>
<div class="card"><h2 style="margin-top:0;">🔐 Смяна на парола</h2><form method="POST"><input type="hidden" name="action" value="password"><label>Текуща парола</label><input type="password" name="current_password" required><label>Нова парола</label><input type="password" name="new_password" required minlength="6"><label>Повтори нова парола</label><input type="password" name="confirm_password" required minlength="6"><button class="btn" style="margin-top:16px;" type="submit">Смени парола</button></form></div>
<div class="card"><h2 style="margin-top:0;">🙋 Искам смяна</h2><form method="POST" action="{{ url_for('ticket_request_shift') }}"><label>Дата</label><input type="date" name="preferred_date" required><label>Предпочитан час</label><input type="text" name="preferred_time" placeholder="08:00-16:00"><label>Коментар</label><input type="text" name="description"><button class="btn" style="margin-top:16px;" type="submit">Изпрати заявка</button></form></div>
</div>{% endblock %}
